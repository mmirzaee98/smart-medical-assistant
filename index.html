<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Smart Medical Assistant</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
    h1 { color: #2c5f8a; }
    input, textarea { width: 100%; padding: 10px; font-size: 16px; box-sizing: border-box; margin-top: 8px; }
    textarea { height: 100px; }
    button { margin-top: 10px; padding: 10px 20px; font-size: 16px; background: #2c5f8a; color: white; border: none; border-radius: 5px; cursor: pointer; margin-right: 8px; }
    button:disabled { background: #999; }
    #result { margin-top: 20px; padding: 15px; background: #f4f4f4; border-radius: 5px; white-space: pre-wrap; min-height: 40px; }
    .disclaimer { margin-top: 20px; font-size: 13px; color: #888; }
    #authMessage { margin-top: 10px; color: #c0392b; }
  </style>
</head>
<body>
  <h1>Smart Medical Assistant</h1>

  <div id="authArea">
    <p>Log in or sign up to use the assistant.</p>
    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password (at least 6 characters)">
    <div>
      <button onclick="signUp()">Sign Up</button>
      <button onclick="logIn()">Log In</button>
    </div>
    <div id="authMessage"></div>
  </div>

  <div id="appArea" style="display:none;">
    <p>Logged in as <span id="userEmail"></span> &nbsp; <button onclick="logOut()">Log out</button></p>
    <p>Describe your symptoms to get general information.</p>
    <textarea id="symptoms" placeholder="e.g. I have a headache and a sore throat..."></textarea>
    <button id="askBtn" onclick="askAssistant()">Ask</button>
    <div id="result"></div>
  </div>

  <p class="disclaimer">This tool provides general information only and is not a substitute for professional medical advice.</p>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://tankfsemlvdwkabpbvky.supabase.co";
    const SUPABASE_KEY = "sb_publishable_DQInWzZjDEI4V2Jk3IhRHQ_khWdCX2c";
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    function updateUI(session) {
      if (session) {
        document.getElementById("authArea").style.display = "none";
        document.getElementById("appArea").style.display = "block";
        document.getElementById("userEmail").textContent = session.user.email;
      } else {
        document.getElementById("authArea").style.display = "block";
        document.getElementById("appArea").style.display = "none";
      }
    }
    sb.auth.onAuthStateChange((event, session) => updateUI(session));
    sb.auth.getSession().then(({ data }) => updateUI(data.session));

    async function signUp() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const msg = document.getElementById("authMessage");
      const { error } = await sb.auth.signUp({ email, password });
      msg.textContent = error ? "Error: " + error.message : "Signed up! Logging you in...";
    }

    async function logIn() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const msg = document.getElementById("authMessage");
      const { error } = await sb.auth.signInWithPassword({ email, password });
      if (error) msg.textContent = "Error: " + error.message;
    }

    async function logOut() {
      await sb.auth.signOut();
    }

    async function askAssistant() {
      const symptoms = document.getElementById("symptoms").value;
      const resultDiv = document.getElementById("result");
      const button = document.getElementById("askBtn");
      if (!symptoms.trim()) { resultDiv.textContent = "Please enter your symptoms first."; return; }
      button.disabled = true;
      resultDiv.textContent = "Thinking... (this can take up to a minute)";
      try {
        const response = await fetch("http://localhost:8000/generate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ prompt: symptoms })
        });
        const data = await response.json();
        resultDiv.textContent = data.response;
        // Save this symptom check to the database
        await sb.from("symptom_checks").insert({ symptoms: symptoms, response: data.response });
      } catch (error) {
        resultDiv.textContent = "Error: could not reach the assistant. " + error;
      } finally {
        button.disabled = false;
      }
    }
  </script>
</body>
</html>
